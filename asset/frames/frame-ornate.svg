<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" preserveAspectRatio="none">
  <!-- 어두운 외곽 -->
  <rect x="1.5" y="1.5" width="197" height="197" fill="none" stroke="#2c1a0e" stroke-width="3"/>
  <!-- 금 띠 -->
  <rect x="5" y="5" width="190" height="190" fill="none" stroke="#b8860b" stroke-width="3"/>
  <!-- 안쪽 얇은 선 -->
  <rect x="9.5" y="9.5" width="181" height="181" fill="none" stroke="#2c1a0e" stroke-width="0.6"/>

  <!-- 4 모서리 L자 코너 플뢰리시 -->
  <g fill="none" stroke="#2c1a0e" stroke-width="1.2" stroke-linecap="round">
    <path d="M14,22 Q14,14 22,14"/>
    <path d="M186,22 Q186,14 178,14"/>
    <path d="M14,178 Q14,186 22,186"/>
    <path d="M186,178 Q186,186 178,186"/>
  </g>
  <g fill="#b8860b">
    <circle cx="14" cy="14" r="2"/>
    <circle cx="186" cy="14" r="2"/>
    <circle cx="14" cy="186" r="2"/>
    <circle cx="186" cy="186" r="2"/>
  </g>

  <!-- 상단 중앙 헤럴드 모티프 (작은 플뢰르) -->
  <g transform="translate(100 4)">
    <path d="M-6,4 Q-3,0 0,4 Q3,0 6,4 L0,8 Z" fill="#b8860b" stroke="#2c1a0e" stroke-width="0.5"/>
    <circle cx="0" cy="3" r="1.5" fill="#7a1c1c"/>
  </g>
  <!-- 하단 중앙 미러 -->
  <g transform="translate(100 196)">
    <path d="M-6,-4 Q-3,0 0,-4 Q3,0 6,-4 L0,-8 Z" fill="#b8860b" stroke="#2c1a0e" stroke-width="0.5"/>
    <circle cx="0" cy="-3" r="1.5" fill="#7a1c1c"/>
  </g>
</svg>
