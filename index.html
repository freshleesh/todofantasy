<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo Fantassy — 퀘스트 기록서</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="parchment-wrapper">
    <header>
      <div class="crest">⚔️</div>
      <h1>Todo Fantassy</h1>
      <p class="subtitle">— 그대의 사소한 임무를 위대한 퀘스트로 —</p>
    </header>

    <!-- ── 온보딩: 직업 입력 ─────────────────────────── -->
    <section id="onboarding" class="hidden">
      <div class="onboarding-card">
        <h2>⚜ 그대의 정체를 밝히라</h2>
        <p class="onboarding-hint">
          현세에서의 그대의 직업을 적으시오. 운명이 그대에게 어울리는 판타지의 직업을 점지하리라.
        </p>
        <div class="input-row">
          <input type="text" id="jobInput" placeholder="예: 로봇공학자, 학생, 카페 직원…" maxlength="60" />
          <button id="jobSubmitBtn">
            <span class="btn-text">운명을 받아들이다</span>
            <span class="spinner hidden"></span>
          </button>
        </div>
      </div>
    </section>

    <!-- ── 직업 인트로 ───────────────────────────────── -->
    <section id="jobIntro" class="hidden">
      <div class="intro-card">
        <p class="intro-prelude">— 운명이 그대를 부른다 —</p>
        <h2 class="intro-job-name" id="introJobName"></h2>
        <div class="intro-text" id="introText"></div>
        <button id="introStartBtn">
          <span class="btn-text">여정을 시작하다</span>
        </button>
      </div>
    </section>

    <!-- ── 게임 본문 ─────────────────────────────────── -->
    <div id="game" class="hidden">

      <!-- 퀘스트 입력 -->
      <section class="quest-input-section">
        <label for="todoInput">📜 오늘의 임무를 고하라</label>
        <div class="input-row">
          <input type="text" id="todoInput" placeholder="예: 마트에서 장 보기" maxlength="200" />
          <button id="addBtn">
            <span class="btn-text">퀘스트 등록</span>
            <span class="spinner hidden"></span>
          </button>
        </div>
      </section>

      <!-- 퀘스트 목록 -->
      <section class="quest-list-section">
        <h2>📖 퀘스트 일람</h2>
        <div id="questList" class="quest-list"></div>
      </section>

      <!-- 캐릭터 패널 -->
      <section class="character-panel">
        <div class="char-header">
          <div class="char-job-line">
            <span class="char-level">Lv.<span id="charLevel">1</span></span>
            <span class="char-job" id="charJob">—</span>
          </div>
          <button id="pendingPoints" class="pending-points hidden"></button>
        </div>
        <div class="xp-bar">
          <div class="xp-fill" id="xpFill"></div>
          <div class="xp-text" id="xpText">0 / 100</div>
        </div>
        <div class="char-stats">
          <span id="stat-str" class="stat-pill">힘 <b>0</b></span>
          <span id="stat-luk" class="stat-pill">운 <b>0</b></span>
          <span id="stat-int" class="stat-pill">지능 <b>0</b></span>
        </div>
        <div class="quest-slots-line">
          <span>퀘스트 슬롯</span>
          <span id="slotCount" class="slot-count">3 / 3</span>
          <span id="slotNext" class="slot-next">가득 참</span>
        </div>
        <button type="button" id="deckViewBtn" class="deck-view-btn">
          🎴 내 보상덱
          <span id="deckViewCount" class="deck-view-count">0장</span>
        </button>
        <div id="reputationBlock" class="reputation-block collapsed">
          <button type="button" id="reputationToggle" class="reputation-toggle">
            <span class="reputation-title">⚜ 그대의 평판</span>
            <span id="reputationStatus" class="reputation-status"></span>
            <span class="reputation-chevron">▾</span>
          </button>
          <div id="reputationBody" class="reputation-body"></div>
        </div>
      </section>

      <!-- 장비 슬롯 -->
      <section class="equipment-section">
        <h2>🛡 장착</h2>
        <div id="equipmentSlots" class="equipment-grid"></div>
      </section>

      <!-- 인벤토리 -->
      <section class="inventory-section">
        <h2>🎒 보관함</h2>
        <div id="inventoryList" class="inventory-list"></div>
      </section>

    </div>

    <footer>
      <p>Powered by <a href="https://deepmind.google/gemini" target="_blank">Google Gemini</a></p>
      <button id="resetBtn" class="reset-btn" title="localStorage 초기화 후 새로고침">데이터 리셋</button>
    </footer>
  </div>

  <!-- ── 보상덱 보기 모달 ──────────────────────────────── -->
  <div id="deckViewModal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-card deck-view-modal-card">
      <h2>🎴 보상덱</h2>
      <p class="modal-hint" id="deckViewHint">총 0장</p>
      <div id="deckViewList" class="deck-view-list"></div>
      <button id="deckViewCloseBtn" class="modal-close">닫기</button>
    </div>
  </div>

  <!-- ── 완수담 모달 ──────────────────────────────────── -->
  <div id="completionModal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-card">
      <h2>📜 완수의 기록</h2>
      <p class="modal-hint" id="completionQuestTitle"></p>
      <div id="completionText" class="completion-text"></div>
      <button id="completionCloseBtn" class="modal-close">닫기</button>
    </div>
  </div>

  <!-- ── 카드 픽 모달 ─────────────────────────────────── -->
  <div id="cardPickModal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-card">
      <h2>🎴 보상 카드</h2>
      <p class="modal-hint" id="cardPickHint">한 장을 선택하시오</p>
      <div id="cardPickList" class="card-list"></div>
    </div>
  </div>

  <!-- ── 레벨업 선택 모달 ────────────────────────────── -->
  <div id="levelupModal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-card">
      <h2>⚜ 레벨 상승</h2>
      <p class="modal-hint">남은 선택: <b id="levelupRemaining">0</b></p>
      <div class="levelup-options">
        <button class="levelup-option" data-levelup="remove">
          <div class="levelup-option-name">🗑 카드 제거</div>
          <div class="levelup-option-desc">덱에서 카드 1장을 영구 제거</div>
        </button>
        <button class="levelup-option" data-levelup="copy">
          <div class="levelup-option-name">📑 카드 복사</div>
          <div class="levelup-option-desc">덱의 카드 1장을 복사하여 추가</div>
        </button>
        <button class="levelup-option" data-levelup="add_draw_extra">
          <div class="levelup-option-name">🎴 + 카드 +2 드로우</div>
          <div class="levelup-option-desc">"뽑을 시 시전: 카드 2장 더 뽑기" 카드를 덱에 추가</div>
        </button>
        <button class="levelup-option" data-levelup="add_xp_bonus">
          <div class="levelup-option-name">⚡ + 즉시 +100 XP</div>
          <div class="levelup-option-desc">"뽑을 시 시전: 경험치 +100" 카드를 덱에 추가</div>
        </button>
      </div>
    </div>
  </div>

  <!-- ── 덱 선택 모달 (제거/복사) ────────────────────── -->
  <div id="deckSelectModal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-card">
      <h2 id="deckSelectTitle">카드 선택</h2>
      <div id="deckSelectList" class="deck-card-list"></div>
      <button id="deckSelectClose" class="modal-close">취소</button>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="local-config.js" onerror="this.remove()"></script>
  <script src="prompts.js"></script>
  <script src="app.js"></script>
</body>
</html>
